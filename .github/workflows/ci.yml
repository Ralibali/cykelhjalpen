name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'agent/**'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck, lint, test and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        id: lint
        continue-on-error: true
        run: bunx eslint . --format json --output-file eslint-report.json

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Upload lint diagnostics
        if: always() && steps.lint.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: eslint-report
          path: eslint-report.json
          if-no-files-found: error
          retention-days: 3

      - name: Enforce lint result
        if: steps.lint.outcome == 'failure'
        run: |
          echo 'ESLint reported errors. See the eslint-report artifact.'
          exit 1
